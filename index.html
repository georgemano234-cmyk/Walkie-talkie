<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITARY RADIO V25 - GLOBAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .device { background: #2b3a2a; width: 100%; max-width: 360px; padding: 20px; border-radius: 40px; border: 6px solid #1e2a1e; text-align: center; position: relative; box-shadow: 0 10px 50px #000; }
        .badge { background: #00ff41; color: #000; padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; position: absolute; top: 20px; left: 20px; }
        .screen { background: #0a0c0a; color: #00ff41; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 3px inset #111; min-height: 40px; font-weight: bold; }
        .chat-box { background: #000; height: 180px; border-radius: 8px; margin-bottom: 10px; border: 2px solid #1e2a1e; overflow-y: auto; padding: 10px; text-align: right; color: #00ff41; font-size: 0.85rem; }
        .msg { border-bottom: 1px solid #1a1a1a; margin-bottom: 5px; padding-bottom: 3px; }
        .input-area { display: flex; gap: 5px; margin-bottom: 15px; }
        input[type="text"] { background: #111; border: 1px solid #00ff41; color: #00ff41; padding: 10px; border-radius: 8px; flex: 1; outline: none; }
        .btn-send { background: #00ff41; color: #000; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .ptt { width: 100%; height: 80px; background: linear-gradient(#d62828, #9b2226); border: none; border-radius: 20px; color: white; font-size: 1.4rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px #000; -webkit-tap-highlight-color: transparent; }
        .ptt:active { background: #ff0000; transform: translateY(3px); box-shadow: none; }
        .sync-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; margin-top: 10px; }
        .btn-connect { width: 100%; background: #457b9d; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="device">
    <div id="unitCount" class="badge">UNITS: 1</div>
    <div class="screen" id="statDisp">OFFLINE / GLOBAL</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="msgIn" placeholder="رسالة...">
        <button class="btn-send" onclick="broadcastMsg()">ارسل</button>
    </div>
    <button id="pttBtn" class="ptt">TALK TO GROUP</button>
    <div class="sync-box">
        <input type="text" id="roomIn" placeholder="اسم الغرفة (مثلا: mina909)">
        <button class="btn-connect" onclick="initGlobalRadio()">اتصال عالمي</button>
    </div>
</div>

<script>
    let peer = null, myStream = null;
    let connections = new Set();
    const iceConfig = { 'iceServers': [
        { 'urls': 'stun:stun.l.google.com:19302' },
        { 'urls': 'stun:stun1.l.google.com:19302' },
        { 'urls': 'stun:stun2.l.google.com:19302' }
    ]};

    navigator.mediaDevices.getUserMedia({ audio: true }).then(s => { 
        myStream = s; myStream.getAudioTracks()[0].enabled = false; 
    });

    function log(m) {
        const box = document.getElementById('chatBox');
        box.innerHTML += `<div class="msg">${m}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function initGlobalRadio() {
        const room = document.getElementById('roomIn').value.trim();
        if(!room) return;
        const hostID = "global-v25-" + room.toLowerCase();

        if(peer) peer.destroy();
        // تفعيل خوادم Google STUN لتجاوز جدران الحماية
        peer = new Peer({ config: iceConfig });

        peer.on('open', (id) => {
            log(`📡 جاري البحث في السحاب.. هويتك: ${id.substring(0,4)}`);
            document.getElementById('statDisp').innerText = "GLOBAL SEARCHING...";
            
            // محاولة الاتصال بالـ Host
            const conn = peer.connect(hostID);
            setupDataConn(conn);
            peer.call(hostID, myStream);

            setTimeout(() => {
                if(connections.size === 0) {
                    peer.destroy();
                    peer = new Peer(hostID, { config: iceConfig });
                    peer.on('open', () => {
                        log("👑 أنت الآن مدير المحطة (HOST)");
                        document.getElementById('statDisp').innerText = "CH: " + room.toUpperCase();
                    });
                    peer.on('connection', setupDataConn);
                    peer.on('call', call => { call.answer(myStream); setupVoiceCall(call); });
                }
            }, 4000);
        });

        peer.on('connection', setupDataConn);
        peer.on('call', call => { call.answer(myStream); setupVoiceCall(call); });
    }

    function setupDataConn(conn) {
        conn.on('open', () => {
            connections.add(conn);
            document.getElementById('unitCount').innerText = `UNITS: ${connections.size + 1}`;
            log("✅ تم الربط مع وحدة بعيدة");
            document.getElementById('statDisp').innerText = "CONNECTED";
        });
        conn.on('data', data => log(data));
        conn.on('close', () => { connections.delete(conn); });
    }

    function setupVoiceCall(call) {
        call.on('stream', stream => {
            const audio = new Audio(); audio.srcObject = stream; audio.autoplay = true;
            document.body.appendChild(audio);
        });
    }

    function broadcastMsg() {
        const msg = document.getElementById('msgIn').value;
        if(!msg || !peer) return;
        const fullMsg = `<b>وحدة ${peer.id.substring(0,3)}:</b> ${msg}`;
        connections.forEach(c => { if(c.open) c.send(fullMsg); });
        log(`<b>أنا:</b> ${msg}`);
        document.getElementById('msgIn').value = "";
    }

    const ptt = document.getElementById('pttBtn');
    const toggleMic = (on) => {
        if(myStream) myStream.getAudioTracks()[0].enabled = on;
        document.getElementById('statDisp').innerText = on ? "TRANSMITTING..." : "CONNECTED";
    };
    ptt.onmousedown = () => toggleMic(true); ptt.onmouseup = () => toggleMic(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); toggleMic(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); toggleMic(false); };
</script>
</body>
</html>
